<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Elevate Automation</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #070707;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: #111111;
      border: 1px solid rgba(212, 175, 55, 0.18);
      border-radius: 14px;
      padding: 36px;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 8px;
      color: #d4af37;
    }

    p {
      color: #b0b0b0;
      line-height: 1.5;
      margin-bottom: 18px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      margin-bottom: 18px;
      background: #000000;
      border: 1px solid #333333;
      color: white;
      border-radius: 10px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #d4af37;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 10px;
      color: #111111;
      margin-bottom: 12px;
    }

    a {
      color: #d4af37;
      text-decoration: none;
    }

    #message {
      margin-top: 18px;
      min-height: 22px;
      color: #dddddd;
    }

    .section {
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Reset Password</h2>
    <p>Request a reset email or set a new password after opening the secure reset link.</p>

    <div class="section">
      <form id="requestResetForm">
        <input id="resetEmail" type="email" placeholder="Your email" />
        <button type="submit">Send Reset Email</button>
      </form>
    </div>

    <div class="section">
      <form id="setNewPasswordForm">
        <input id="newPassword" type="password" placeholder="New password" />
        <button type="submit">Update Password</button>
      </form>
    </div>

    <p id="message"></p>
    <p><a href="/login.html">Back to login</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    const message = document.getElementById("message");

    document.getElementById("requestResetForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("resetEmail").value.trim();

      message.textContent = "Sending reset email...";

      try {
        await sendResetPassword(email);
        message.textContent = "Reset email sent. Check your inbox.";
      } catch (err) {
        message.textContent = err.message || "Could not send reset email.";
      }
    });

    document.getElementById("setNewPasswordForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const newPassword = document.getElementById("newPassword").value;

      message.textContent = "Updating password...";

      try {
        await updatePassword(newPassword);
        message.textContent = "Password updated. You can now log in.";
      } catch (err) {
        message.textContent = err.message || "Could not update password.";
      }
    });
  </script>
</body>
</html>
