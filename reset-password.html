<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Elevate Automation</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #070707;
      color: #fff;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
    }
    .wrap {
      width: 100%;
      max-width: 500px;
      background: #111;
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 18px;
      padding: 28px;
    }
    h1 { margin: 0 0 10px; color: #d4af37; }
    p { color: #aaa; line-height: 1.5; }
    .field { margin-top: 16px; }
    label { display: block; margin-bottom: 8px; font-size: 14px; color: #ccc; }
    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
      background: #0b0b0b;
      color: #fff;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #d4af37;
      color: #111;
      font-weight: 700;
      cursor: pointer;
    }
    .msg { margin-top: 16px; font-size: 14px; line-height: 1.5; }
    a { color: #d4af37; }
    .section { margin-top: 24px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Password Reset</h1>
    <p>Request a reset email or set a new password after opening the secure reset link.</p>

    <div class="section">
      <form id="requestResetForm">
        <div class="field">
          <label for="resetEmail">Email</label>
          <input id="resetEmail" type="email" placeholder="you@example.com" />
        </div>
        <button type="submit">Send Reset Email</button>
      </form>
    </div>

    <div class="section">
      <form id="setNewPasswordForm">
        <div class="field">
          <label for="newPassword">New Password</label>
          <input id="newPassword" type="password" placeholder="Enter new password" />
        </div>
        <button type="submit">Update Password</button>
      </form>
    </div>

    <div class="msg" id="message"></div>
    <div class="msg"><a href="/login.html">Back to login</a></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    const message = document.getElementById("message");

    document.getElementById("requestResetForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      try {
        const email = document.getElementById("resetEmail").value.trim();
        await sendResetPassword(email);
        message.textContent = "Reset email sent. Check your inbox.";
      } catch (err) {
        message.textContent = err.message || "Could not send reset email.";
      }
    });

    document.getElementById("setNewPasswordForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      try {
        const newPassword = document.getElementById("newPassword").value;
        await updatePassword(newPassword);
        message.innerHTML = 'Password updated. <a href="/login.html">Log in</a>.';
      } catch (err) {
        message.textContent = err.message || "Could not update password.";
      }
    });
  </script>
</body>
</html>
