<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elevate Automation Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #070707;
      --panel: #111111;
      --border: rgba(212, 175, 55, 0.18);
      --gold: #d4af37;
      --gold-soft: rgba(212, 175, 55, 0.12);
      --text: #f5f5f5;
      --muted: #a1a1aa;
      --danger: #ff5c5c;
      --warning: #f0c36d;
      --success: #8fd19e;
      --shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
      --radius: 18px;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(212,175,55,0.08), transparent 30%),
        radial-gradient(circle at top right, rgba(212,175,55,0.05), transparent 25%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 28px;
    }

    .dashboard-shell {
      max-width: 1320px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .brand-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.9;
    }

    .brand-title {
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 800;
      line-height: 1;
    }

    .brand-subtitle {
      color: var(--muted);
      font-size: 14px;
      max-width: 720px;
      line-height: 1.5;
    }

    .topbar-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--border);
      background: linear-gradient(180deg, #1d1d1d, #101010);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.18s ease;
      box-shadow: var(--shadow);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(212, 175, 55, 0.35);
    }

    .btn-gold {
      background: linear-gradient(180deg, #d4af37, #b9931d);
      color: #111;
      border: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 20px;
    }

    .card {
      background: linear-gradient(180deg, rgba(24,24,24,0.98), rgba(14,14,14,0.98));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: var(--radius);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .span-12 { grid-column: span 12; }
    .span-8 { grid-column: span 8; }
    .span-6 { grid-column: span 6; }
