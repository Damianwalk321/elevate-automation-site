<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elevate Automation | Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #050505;
      --bg-2: #090909;
      --panel: #0d0d10;
      --panel-2: #111114;
      --line: rgba(212, 175, 55, 0.16);
      --line-strong: rgba(212, 175, 55, 0.28);
      --gold: #d4af37;
      --gold-2: #f0d46b;
      --text: #f5f5f5;
      --muted: #a1a1aa;
      --green: #86efac;
      --red: #f87171;
      --blue: #93c5fd;
      --shadow: 0 16px 40px rgba(0,0,0,0.28);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top right, rgba(212,175,55,0.08), transparent 24%),
        linear-gradient(180deg, #060606 0%, #000 100%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px 1fr;
    }

    .sidebar {
      border-right: 1px solid rgba(255,255,255,0.04);
      background: rgba(7,7,8,0.96);
      padding: 20px 16px;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .brand-card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(18,18,18,0.95), rgba(10,10,10,0.98));
      border-radius: 26px;
      padding: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }

    .brand-title {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .brand-sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .workspace-card {
      margin-top: 14px;
      border: 1px solid rgba(255,255,255,0.05);
      background: rgba(255,255,255,0.02);
      border-radius: 18px;
      padding: 14px;
    }

    .workspace-card .label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #8a8a93;
      margin-bottom: 8px;
    }

    .workspace-card .value {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .workspace-card .sub {
      color: var(--muted);
      font-size: 13px;
    }

    .nav-group {
      margin-top: 18px;
    }

    .nav-label {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #8a8a93;
      padding: 0 10px 10px;
    }

    .nav-list {
      display: grid;
      gap: 8px;
    }

    .nav-item {
      width: 100%;
      border: 1px solid transparent;
      background: transparent;
      color: #d4d4d8;
      display: flex;
      align-items: center;
      gap: 12px;
      border-radius: 18px;
      padding: 13px 14px;
      cursor: pointer;
      transition: 0.18s ease;
      text-align: left;
      font-size: 14px;
      font-weight: 600;
    }

    .nav-item:hover {
      background: rgba(255,255,255,0.03);
      color: #fff;
      border-color: rgba(255,255,255,0.05);
    }

    .nav-item.active {
      background: linear-gradient(180deg, var(--gold-2), var(--gold));
      color: #121212;
      border-color: transparent;
      box-shadow: 0 10px 24px rgba(212,175,55,0.16);
    }

    .nav-icon {
      width: 18px;
      text-align: center;
      font-size: 15px;
      line-height: 1;
      opacity: 0.95;
    }

    .sidebar-footer {
      margin-top: 18px;
      display: grid;
      gap: 10px;
    }

    .side-btn {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #131313, #0b0b0d);
      color: #fff;
      padding: 12px 14px;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.18s ease;
      text-align: center;
    }

    .side-btn:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
    }

    .side-btn.gold {
      background: linear-gradient(180deg, var(--gold-2), var(--gold));
      color: #111;
      border: none;
