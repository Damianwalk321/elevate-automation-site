<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account | Elevate Automation</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #070707;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #111111;
      border: 1px solid rgba(212, 175, 55, 0.18);
      border-radius: 14px;
      padding: 36px;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 8px;
      color: #d4af37;
    }

    p {
      color: #b0b0b0;
      line-height: 1.5;
      margin-bottom: 18px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      margin-bottom: 18px;
      background: #000000;
      border: 1px solid #333333;
      color: white;
      border-radius: 10px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #d4af37;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 10px;
      color: #111111;
    }

    a {
      color: #d4af37;
      text-decoration: none;
    }

    #message {
      margin-top: 18px;
      min-height: 22px;
      color: #dddddd;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Create Account</h2>
    <p>Create your Elevate Automation account.</p>

    <form id="signupForm">
      <input id="name" type="text" placeholder="Full Name" />
      <input id="email" type="email" placeholder="Email" required />
      <input id="password" type="password" placeholder="Password" required />
      <button type="submit">Create Account</button>
    </form>

    <p id="message"></p>
    <p><a href="/login.html">Already have an account?</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const message = document.getElementById("message");

      message.textContent = "Creating account...";

      try {
        const referral = {
          referral_code: String(localStorage.getItem("elevate_referral_code") || "").trim(),
          referral_source: String(localStorage.getItem("elevate_referral_source") || "").trim() || "direct"
        };
        await signUpWithEmail(email, password, name, referral);
        message.textContent = "Account created. Check your email, then log in.";
      } catch (err) {
        message.textContent = err.message || "Signup failed.";
      }
    });
  </script>
</body>
</html>
