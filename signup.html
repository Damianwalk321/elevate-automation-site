<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | Elevate Automation</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #070707;
      color: #fff;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
    }
    .wrap {
      width: 100%;
      max-width: 460px;
      background: #111;
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 18px;
      padding: 28px;
    }
    h1 { margin: 0 0 10px; color: #d4af37; }
    p { color: #aaa; line-height: 1.5; }
    .field { margin-top: 16px; }
    label { display: block; margin-bottom: 8px; font-size: 14px; color: #ccc; }
    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
      background: #0b0b0b;
      color: #fff;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #d4af37;
      color: #111;
      font-weight: 700;
      cursor: pointer;
    }
    .msg { margin-top: 16px; font-size: 14px; line-height: 1.5; }
    a { color: #d4af37; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Create Account</h1>
    <p>Create your Elevate Automation account. This becomes the long-term access layer for dashboard, billing, and tool control.</p>

    <form id="signupForm">
      <div class="field">
        <label for="fullName">Full Name</label>
        <input id="fullName" type="text" placeholder="Damian Walker" />
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Minimum 6+ characters" required />
      </div>

      <button type="submit">Create Account</button>
    </form>

    <div class="msg" id="message"></div>
    <div class="msg"><a href="/login.html">Already have an account? Log in</a></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const message = document.getElementById("message");
      message.textContent = "Creating account...";

      try {
        const fullName = document.getElementById("fullName").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        await signUpWithEmail(email, password, fullName);

        message.innerHTML = 'Account created. Check your email to confirm, then <a href="/login.html">log in</a>.';
      } catch (err) {
        message.textContent = err.message || "Signup failed.";
      }
    });
  </script>
</body>
</html>
