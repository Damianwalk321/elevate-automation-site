<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Elevate Automation</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #070707;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #111111;
      border: 1px solid rgba(212, 175, 55, 0.18);
      border-radius: 14px;
      padding: 36px;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 8px;
      color: #d4af37;
    }

    p {
      color: #b0b0b0;
      line-height: 1.5;
      margin-bottom: 18px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      margin-bottom: 18px;
      background: #000000;
      border: 1px solid #333333;
      color: white;
      border-radius: 10px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #d4af37;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 10px;
      color: #111111;
    }

    a {
      color: #d4af37;
      text-decoration: none;
    }

    #message {
      margin-top: 18px;
      min-height: 22px;
      color: #dddddd;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Login</h2>
    <p>Access your Elevate Automation dashboard.</p>

    <form id="loginForm">
      <input id="email" type="email" placeholder="Email" required />
      <input id="password" type="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>

    <p id="message"></p>
    <p><a href="/reset-password.html">Forgot password?</a></p>
    <p><a href="/signup.html">Create account</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/auth.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const form = document.getElementById("loginForm");
      const message = document.getElementById("message");

      form.addEventListener("submit", async function (e) {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        message.textContent = "Logging in...";

        try {
          if (typeof window.signInWithEmail !== "function") {
            throw new Error("signInWithEmail is not available. auth.js may not be loading.");
          }

          await window.signInWithEmail(email, password);
          window.location.href = "/dashboard.html";
        } catch (err) {
          console.error("Login error:", err);
          message.textContent = err.message || "Login failed.";
        }
      });
    });
  </script>
</body>
</html>
